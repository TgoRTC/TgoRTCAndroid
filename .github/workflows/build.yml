name: Build and Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build SDK
        run: ./gradlew :tgortc:assembleRelease

      - name: Auto tag and trigger JitPack
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            NEW_TAG="v1.0.0"
          else
            MAJOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "Creating tag: $NEW_TAG"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "Waiting for GitHub to propagate tag..."
          sleep 30
          echo "Triggering JitPack build for $NEW_TAG ..."
          # 重试3次，确保JitPack能找到tag
          for i in 1 2 3; do
            RESPONSE=$(curl -s -m 60 "https://jitpack.io/com/github/TgoRTC/TgoRTCAndroid/$NEW_TAG/TgoRTCAndroid-$NEW_TAG.pom" 2>&1)
            if echo "$RESPONSE" | grep -q "not found"; then
              echo "Attempt $i: Tag not yet visible to JitPack, waiting 20s..."
              sleep 20
            else
              echo "JitPack build triggered successfully."
              break
            fi
          done
