name: Build and Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build SDK
        run: ./gradlew :tgortc:assembleRelease

      - name: Auto tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: tag
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            NEW_TAG="v1.0.0"
          else
            MAJOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "Creating tag: $NEW_TAG"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Trigger JitPack build
        if: steps.tag.outputs.tag != ''
        run: |
          NEW_TAG="${{ steps.tag.outputs.tag }}"
          echo "Waiting 60s for GitHub to propagate tag $NEW_TAG ..."
          sleep 60

          echo "=== Step 1: Trigger JitPack build via API ==="
          curl -s -m 30 "https://jitpack.io/api/builds/com.github.TgoRTC/TgoRTCAndroid/$NEW_TAG" || true

          echo "=== Step 2: Request module POM to ensure build starts ==="
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /tmp/jitpack_response.txt -w "%{http_code}" -m 120 \
              "https://jitpack.io/com/github/TgoRTC/TgoRTCAndroid/${NEW_TAG}/tgortc-${NEW_TAG}.pom")
            echo "Attempt $i: HTTP $HTTP_CODE"
            cat /tmp/jitpack_response.txt | head -5
            if [ "$HTTP_CODE" = "200" ]; then
              echo "JitPack build succeeded!"
              break
            fi
            echo "Build not ready yet, waiting 60s before retry..."
            sleep 60
          done
